services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    volumes:
      - audio-data:/data/audio
    environment:
      - PORT=3001
      - AUDIO_DIR=/data/audio

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

volumes:
  audio-data:
    driver: local
