name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install

      # API checks
      - name: API type check
        run: cd apps/api && ./node_modules/.bin/tsc --noEmit
      - name: API tests
        run: cd apps/api && ./node_modules/.bin/vitest run

      # Web checks
      - name: Web type check
        run: cd apps/web && ./node_modules/.bin/svelte-kit sync && ./node_modules/.bin/svelte-check --tsconfig ./tsconfig.json
